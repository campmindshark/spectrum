<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#090b10" />
  <title>Spectrum Maintenance Console</title>
  <link rel="stylesheet" href="console.css?v=square-corners" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to maintenance controls</a>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">S</span>
      <div>
        <h1>Spectrum</h1>
        <p>Maintenance console</p>
      </div>
    </div>
    <div class="header-actions">
      <span class="connection-badge pending" id="connection" role="status" aria-live="polite">Connecting</span>
      <a class="header-link" href="/" aria-label="Return to live controls"><span>Live controls</span><b aria-hidden="true">←</b></a>
    </div>
  </header>

  <main id="main">
    <div class="telemetry" id="telemetry" aria-label="Live telemetry"></div>
    <div class="status-message pending" id="status" role="alert" aria-live="assertive">Loading maintenance controls…</div>
    <div class="maintenance-grid">
      <section id="brightness" class="section collapsible"></section>
      <section id="tempo" class="section collapsible"></section>
      <section id="testpatterns" class="section collapsible"></section>
      <section id="devices" class="section collapsible"></section>
      <section id="advanced" class="section collapsible" data-default-collapsed="true"></section>
      <section id="locks" class="section"></section>
      <section id="wands" class="section collapsible wide"></section>
      <section id="calibration" class="section collapsible wide"></section>
    </div>
  </main>

  <footer class="page-footer"><a href="/">← Return to live controls</a></footer>
  <script>window.SPECTRUM_SCOPE = "maintenance";</script>
  <script src="app.js"></script>
  <script src="collapsible.js"></script>
  <script src="calibration.js?v=square-corners"></script>
  <script src="wands.js"></script>
</body>
</html>
