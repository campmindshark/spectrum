<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Spectrum</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: system-ui, sans-serif; margin: 0; padding: 1rem;
      background: #111; color: #eee; -webkit-tap-highlight-color: transparent;
    }
    h1 { font-size: 1.2rem; margin: 0 0 1rem; }
    .param { margin-bottom: 1rem; }
    .param label { display: block; font-size: 0.85rem; margin-bottom: 0.25rem; }
    .param .val { color: #8cf; float: right; font-variant-numeric: tabular-nums; }
    input[type=range] { width: 100%; }
    select, input[type=checkbox] { font-size: 1rem; }
    .status { position: fixed; bottom: 0; left: 0; right: 0; padding: 0.4rem 1rem;
      font-size: 0.75rem; background: #000; color: #6c6; }
    .telemetry { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem;
      font-size: 0.8rem; color: #8cf; font-variant-numeric: tabular-nums; }
    .telemetry-item { background: #1c1c22; padding: 0.25rem 0.5rem; border-radius: 4px; }
    a { color: #8cf; }
    .operator { margin-bottom: 1rem; }
    .operator button { width: 100%; font-size: 1.1rem; font-weight: bold;
      padding: 0.7rem; border: none; border-radius: 6px; cursor: pointer;
      color: #fff; }
    .operator button.stopped { background: #185018; }
    .operator button.running { background: #7a1818; }
    .operator button:disabled { opacity: 0.5; cursor: default; }
    .wands { border-top: 1px solid #333; margin-top: 1.5rem; padding-top: 0.5rem; }
    .wands h2 { font-size: 1rem; margin: 0 0 0.25rem; }
    .wand-summary { font-size: 0.85rem; color: #8cf; margin: 0.25rem 0 0.5rem; }
    .wand-table { width: 100%; border-collapse: collapse;
      font-family: ui-monospace, monospace; font-size: 0.8rem; }
    .wand-table th { text-align: left; font-weight: normal; color: #8cf;
      border-bottom: 1px solid #333; padding: 0.15rem 0.4rem; white-space: nowrap; }
    .wand-table td { padding: 0.15rem 0.4rem; white-space: nowrap;
      font-variant-numeric: tabular-nums; }
    .layers { border-top: 1px solid #333; margin-top: 1.5rem; padding-top: 0.5rem;
      margin-bottom: 1rem; }
    .layers h2 { font-size: 1rem; margin: 0 0 0.5rem; }
    .layers .hint { font-size: 0.75rem; color: #888; margin: 0 0 0.5rem; }
    .layer-row { background: #1c1c22; border-radius: 6px; padding: 0.5rem;
      margin-bottom: 0.5rem; }
    .layer-row .top { display: flex; gap: 0.4rem; align-items: center;
      margin-bottom: 0.4rem; }
    .layer-row .top select { flex: 1; min-width: 0; }
    .layer-row .bottom { display: flex; gap: 0.4rem; align-items: center; }
    .layer-row .bottom input[type=range] { flex: 1; min-width: 0; }
    .layer-row .layer-params { margin-top: 0.4rem; display: flex;
      flex-direction: column; gap: 0.3rem; }
    .layer-row .param { display: flex; gap: 0.4rem; align-items: center;
      font-size: 0.75rem; color: #bbb; }
    .layer-row .param .param-label { flex: 0 0 5rem; }
    .layer-row .param input[type=range] { flex: 1; min-width: 0; }
    .layer-row .param select { flex: 1; min-width: 0; }
    .layer-row .layer-notes { width: 100%; box-sizing: border-box; margin-bottom: 0.4rem;
      background: #111; color: #eee; border: 1px solid #333; border-radius: 4px;
      padding: 0.3rem 0.4rem; font-size: 0.8rem; }
    .layer-row button { background: #333; color: #eee; border: none;
      border-radius: 4px; padding: 0.3rem 0.5rem; cursor: pointer; }
    .layer-row button:disabled { opacity: 0.4; cursor: default; }
    .layers .add { background: #185018; color: #fff; border: none;
      border-radius: 6px; padding: 0.5rem 0.8rem; cursor: pointer;
      font-size: 0.9rem; }
    .scenes { border-top: 1px solid #333; margin-top: 1.5rem; padding-top: 0.5rem;
      margin-bottom: 1rem; }
    .scenes h2 { font-size: 1rem; margin: 0 0 0.5rem; }
    .scenes .scene-row { display: flex; gap: 0.4rem; align-items: center;
      margin-bottom: 0.4rem; }
    .scenes .scene-row select, .scenes .scene-row input[type=text] {
      flex: 1; min-width: 0; font-size: 1rem; }
    .scenes .scene-row button { background: #333; color: #eee; border: none;
      border-radius: 4px; padding: 0.4rem 0.7rem; cursor: pointer; }
    .palette { border-top: 1px solid #333; margin-top: 1.5rem; padding-top: 0.5rem;
      margin-bottom: 1rem; }
    .palette h2 { font-size: 1rem; margin: 0 0 0.5rem; }
    .palette .palette-subtitle { font-size: 0.75rem; color: #888;
      margin: 0.5rem 0 0.3rem; }
    .palette-row { display: flex; gap: 0.4rem; align-items: center;
      margin-bottom: 0.3rem; }
    .palette-row .palette-idx { flex: 0 0 1rem; font-size: 0.8rem; color: #888;
      font-variant-numeric: tabular-nums; }
    .palette-row input[type=color] { width: 2rem; height: 1.6rem; padding: 0;
      border: none; background: none; }
    .palette-row .palette-grad { display: flex; align-items: center; }
    .palette-row .palette-preview { flex: 1; height: 1.4rem; border-radius: 4px;
      border: 1px solid #333; }
    .palette-presets { display: flex; flex-direction: column; gap: 0.3rem;
      margin-bottom: 0.4rem; }
    .palette-empty { font-size: 0.8rem; color: #888; }
    .palette-preset { display: flex; gap: 0.4rem; align-items: center;
      background: #1c1c22; border-radius: 6px; padding: 0.35rem 0.5rem;
      cursor: pointer; }
    .palette-preset .palette-strip { display: flex; flex: 0 0 auto;
      border: 1px solid #333; border-radius: 3px; overflow: hidden; }
    .palette-preset .palette-cell { width: 0.7rem; height: 1rem; }
    .palette-preset .palette-name { flex: 1; min-width: 0; font-size: 0.85rem;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .palette-preset button { background: #333; color: #eee; border: none;
      border-radius: 4px; padding: 0.3rem 0.5rem; cursor: pointer; }
    .palette-saverow { display: flex; gap: 0.4rem; align-items: center; }
    .palette-saverow input[type=text] { flex: 1; min-width: 0; font-size: 1rem; }
    .palette-saverow button { background: #333; color: #eee; border: none;
      border-radius: 4px; padding: 0.4rem 0.7rem; cursor: pointer; }
    /* Two-column layout mirroring the native VJ HUD: controls (palette, params,
       wands) on the left, the performance surface (scenes + layers) on the
       right. Collapses to a single stacked column on phones. */
    .columns { display: flex; gap: 1.5rem; align-items: flex-start; }
    .column-left { flex: 0 0 340px; }
    .column-right { flex: 1; min-width: 0; }
    .column > :first-child { margin-top: 0; border-top: none; padding-top: 0; }
    @media (max-width: 760px) {
      .columns { flex-direction: column; gap: 0; }
      .column-left, .column-right { flex: 1 1 auto; width: 100%; }
      .column > :first-child { border-top: 1px solid #333;
        margin-top: 1.5rem; padding-top: 0.5rem; }
      .column-left > :first-child { border-top: none;
        margin-top: 0; padding-top: 0; }
    }
  </style>
</head>
<body>
  <h1>Spectrum &mdash; Controls</h1>
  <div class="operator" id="operator"></div>
  <div class="telemetry" id="telemetry"></div>
  <div class="columns">
    <div class="column column-left">
      <div class="palette" id="palette"></div>
      <div id="params"></div>
      <div class="wands" id="wands"></div>
    </div>
    <div class="column column-right">
      <div class="scenes" id="scenes"></div>
      <div class="layers" id="layers"></div>
    </div>
  </div>
  <div class="status" id="status">loading&hellip;</div>
  <p style="font-size:0.75rem"><a href="/maintenance.html">Maintenance &rarr;</a></p>
  <script src="app.js"></script>
  <script src="layers.js"></script>
  <script src="scenes.js"></script>
  <script src="palettes.js"></script>
  <script src="wands-mini.js"></script>
</body>
</html>
