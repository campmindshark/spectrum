<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#090b10" />
  <title>Spectrum Operator Console</title>
  <link rel="stylesheet" href="console.css?v=square-corners" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to controls</a>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">S</span>
      <div>
        <h1>Spectrum</h1>
        <p>Operator console</p>
      </div>
    </div>
    <div class="header-actions">
      <span class="connection-badge pending" id="connection" role="status" aria-live="polite">Connecting</span>
      <a class="header-link" href="/maintenance.html" aria-label="Open maintenance controls"><span>Maintenance</span><b aria-hidden="true">⚙</b></a>
    </div>
  </header>

  <main id="main">
    <div class="hero" aria-label="Engine readiness">
      <div class="operator" id="operator"></div>
      <div class="telemetry" id="telemetry" aria-label="Live telemetry"></div>
    </div>
    <div class="status-message pending" id="status" role="alert" aria-live="assertive">Loading controls…</div>

    <div class="columns">
      <div class="column column-left">
        <section class="params-section collapsible" id="params-section" data-default-collapsed-mobile="true">
          <h2>Global speeds</h2>
          <div id="params"></div>
        </section>
        <section class="palette collapsible" id="palette"></section>
        <section class="wands collapsible" id="wands"></section>
      </div>
      <div class="column column-right">
        <section class="scenes collapsible" id="scenes"></section>
        <section class="layers collapsible" id="layers"></section>
        <section class="dome-simulator collapsible" id="dome-simulator" data-default-collapsed="true">
          <h2>Dome preview</h2>
          <div class="dome-simulator-toolbar">
            <button type="button" id="dome-simulator-toggle">Start preview</button>
            <span class="dome-simulator-state" id="dome-simulator-state">Off</span>
          </div>
          <canvas id="dome-simulator-canvas" width="420" height="420" hidden aria-label="Live dome preview"></canvas>
        </section>
      </div>
    </div>
  </main>

  <footer class="page-footer">Spectrum live controller · <a href="/maintenance.html">Open maintenance</a></footer>
  <script src="app.js"></script>
  <script src="collapsible.js"></script>
  <script src="layers.js"></script>
  <script src="scenes.js"></script>
  <script src="palettes.js"></script>
  <script src="wands-mini.js"></script>
  <script src="dome-simulator.js"></script>
</body>
</html>
