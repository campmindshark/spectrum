name: OPC Wire Tests

on:
  push:
    branches: [ "master" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Run OPC wire and layer pipeline tests
      run: dotnet run --project Tests/Spectrum.LayerPipeline.Tests.csproj -c Release
