name: MSBuild

on:
  push:
    tags:
      - v*
  pull_request:
    branches: [ "no-madmom" ]

permissions:
  contents: write

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # The solution also contains the Madmom Python project (.pyproj), which the
    # dotnet CLI cannot build (it needs the Visual Studio Python Tools targets).
    # Beat detection runs out of a separate Python virtualenv at runtime, so the
    # .pyproj is not part of the build artifact -- build the WPF app project
    # directly, which transitively builds the four C# libraries.
    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: dotnet build Spectrum/Spectrum.csproj -c ${{env.BUILD_CONFIGURATION}}
    - name: Test OPC wire output and layer pipeline
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: dotnet run --project Tests/Spectrum.LayerPipeline.Tests.csproj -c ${{env.BUILD_CONFIGURATION}}
    - uses: actions/upload-artifact@v3
      name: Upload Artifact
      with:
        name: ${{github.sha}}
        path: Spectrum/bin/
    - name: Zip Release
      uses: thedoctor0/zip-release@main
      with:
        directory: './Spectrum/bin/Release'
        type: 'zip'
        filename: 'release.zip'
    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: './Spectrum/bin/Release/release.zip'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
