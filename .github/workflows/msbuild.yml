name: Build

on:
  push:
    branches: [ "master" ]
    tags:
      - v*
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        architecture: x64

    - name: Install uv
      run: python -m pip install uv==0.11.26

    - name: Install FFmpeg
      shell: pwsh
      run: |
        choco install ffmpeg --yes --no-progress
        ffmpeg -version

    - name: Build and test
      shell: pwsh
      run: |
        if ("${{ github.ref }}" -like "refs/tags/v*") {
          .\build.ps1 -PythonPath (Get-Command python).Source
        } else {
          .\build.ps1 -PythonPath (Get-Command python).Source -SkipPortable
        }

    - name: Upload Python wheel
      uses: actions/upload-artifact@v4
      with:
        name: madmom-${{ github.sha }}
        path: artifacts/wheels/*.whl

    - name: Upload portable Windows application
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: Spectrum-win-x64
        path: artifacts/Spectrum-win-x64.zip
        if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download portable Windows application
      uses: actions/download-artifact@v5
      with:
        name: Spectrum-win-x64
        path: dist

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "$GITHUB_REF_NAME" \
          dist/Spectrum-win-x64.zip \
          --repo "$GITHUB_REPOSITORY" \
          --verify-tag \
          --generate-notes
