name: Build

on:
  push:
    branches: [ "master" ]
    tags:
      - v*
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  portability:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Verify portable Madmom host-API selection
      run: python Madmom/tests/test_audio_host_api.py

    - name: Build and test the portable foundation
      run: >-
        dotnet run
        --project Tests/Portability/Spectrum.Portability.Tests.csproj
        -c Release

    - name: Run the portable layer pipeline
      run: >-
        dotnet run
        --project Tests/PortableLayerPipeline/Spectrum.PortableLayerPipeline.Tests.csproj
        -c Release

    - name: Build the Linux headless host
      run: >-
        dotnet build
        Host/Spectrum.Host.csproj
        -c Release

    - name: Validate the headless composition
      run: >-
        dotnet run
        --project Host/Spectrum.Host.csproj
        -c Release
        --no-build
        --no-restore
        --
        --check
        --data-dir "${{ runner.temp }}/spectrum"

    - name: Publish the self-contained Linux headless host
      run: >-
        dotnet publish
        Host/Spectrum.Host.csproj
        -c Release
        -r linux-x64
        --self-contained true
        -p:PublishSingleFile=false
        -o "${{ runner.temp }}/Spectrum-linux-x64"

    - name: Stress HTTP writes and repeated SIGTERM shutdown
      shell: bash
      run: |
        set -euo pipefail

        publish_dir="${RUNNER_TEMP}/Spectrum-linux-x64"
        data_dir="${RUNNER_TEMP}/spectrum-process-test"
        log_file="${RUNNER_TEMP}/spectrum-process-test.log"
        port=18080
        host_pid=""

        cleanup() {
          if [[ -n "$host_pid" ]] && kill -0 "$host_pid" 2>/dev/null; then
            kill -TERM "$host_pid"
            wait "$host_pid" || true
          fi
        }
        trap cleanup EXIT

        "$publish_dir/Spectrum.Host" \
          --data-dir "$data_dir" \
          --port "$port" \
          >"$log_file" 2>&1 &
        host_pid=$!

        ready=false
        for _ in {1..30}; do
          if curl --fail --silent \
              "http://127.0.0.1:${port}/api/operator" >/dev/null; then
            ready=true
            break
          fi
          if ! kill -0 "$host_pid" 2>/dev/null; then
            cat "$log_file"
            wait "$host_pid" || true
            exit 1
          fi
          sleep 1
        done
        if [[ "$ready" != true ]]; then
          cat "$log_file"
          echo "Spectrum.Host did not become ready" >&2
          exit 1
        fi

        audio_state=$(curl --fail --silent \
          "http://127.0.0.1:${port}/api/maintenance/audio")
        grep --fixed-strings '"backend":"ALSA"' <<<"$audio_state"
        if grep --quiet --fixed-strings \
            'Unable to load shared library' <<<"$audio_state"; then
          echo "The published host could not load libasound.so.2" >&2
          exit 1
        fi

        missing_audio_device="hw:SPECTRUM_CI_MISSING,0"
        curl --fail --silent \
          --request PUT \
          --header 'Content-Type: application/json' \
          --data "{\"value\":\"${missing_audio_device}\"}" \
          "http://127.0.0.1:${port}/api/maintenance/parameters/audioDeviceID" \
          >/dev/null
        sleep 1
        audio_state=$(curl --fail --silent \
          "http://127.0.0.1:${port}/api/maintenance/audio")
        grep --fixed-strings \
          '"selectedDeviceId":"hw:SPECTRUM_CI_MISSING,0"' \
          <<<"$audio_state"
        curl --fail --silent \
          "http://127.0.0.1:${port}/api/operator" >/dev/null

        write_pids=()
        for value in {101..140}; do
          curl --fail --silent \
            --request PUT \
            --header 'Content-Type: application/json' \
            --data "{\"value\":0.${value}}" \
            "http://127.0.0.1:${port}/api/parameters/domeGlobalFadeSpeed" \
            >/dev/null &
          write_pids+=("$!")
        done
        for write_pid in "${write_pids[@]}"; do
          wait "$write_pid"
        done

        curl --fail --silent \
          --request PUT \
          --header 'Content-Type: application/json' \
          --data '{"value":0.125}' \
          "http://127.0.0.1:${port}/api/parameters/domeGlobalFadeSpeed" \
          >/dev/null

        kill -TERM "$host_pid"
        for _ in {1..3}; do
          kill -TERM "$host_pid" 2>/dev/null || true
        done
        if ! wait "$host_pid"; then
          cat "$log_file"
          exit 1
        fi
        host_pid=""
        trap - EXIT

        grep --fixed-strings \
          "Stopping Spectrum headless host..." "$log_file"
        grep --fixed-strings \
          "<domeGlobalFadeSpeed>0.125</domeGlobalFadeSpeed>" \
          "$data_dir/spectrum_config.xml"
        grep --fixed-strings \
          "<audioDeviceID>hw:SPECTRUM_CI_MISSING,0</audioDeviceID>" \
          "$data_dir/spectrum_config.xml"

    - name: Archive the Linux headless host
      shell: bash
      run: >-
        tar
        -C "${RUNNER_TEMP}/Spectrum-linux-x64"
        -czf "${RUNNER_TEMP}/Spectrum-linux-x64.tar.gz"
        .

    - name: Upload the Linux headless host
      uses: actions/upload-artifact@v4
      with:
        name: Spectrum-linux-x64
        path: ${{ runner.temp }}/Spectrum-linux-x64.tar.gz
        if-no-files-found: error

  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        architecture: x64

    - name: Install uv
      run: python -m pip install uv==0.11.26

    - name: Install FFmpeg
      shell: pwsh
      run: |
        choco install ffmpeg --yes --no-progress
        ffmpeg -version

    - name: Build and test
      shell: pwsh
      run: |
        if ("${{ github.ref }}" -like "refs/tags/v*") {
          .\build.ps1 -PythonPath (Get-Command python).Source
        } else {
          .\build.ps1 -PythonPath (Get-Command python).Source -SkipPortable
        }

    - name: Upload Python wheel
      uses: actions/upload-artifact@v4
      with:
        name: madmom-${{ github.sha }}
        path: artifacts/wheels/*.whl

    - name: Upload portable Windows application
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: Spectrum-win-x64
        path: artifacts/Spectrum-win-x64.zip
        if-no-files-found: error

  release:
    needs: [portability, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download portable Windows application
      uses: actions/download-artifact@v5
      with:
        name: Spectrum-win-x64
        path: dist

    - name: Download Linux headless application
      uses: actions/download-artifact@v5
      with:
        name: Spectrum-linux-x64
        path: dist

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "$GITHUB_REF_NAME" \
          dist/Spectrum-win-x64.zip \
          dist/Spectrum-linux-x64.tar.gz \
          --repo "$GITHUB_REPOSITORY" \
          --verify-tag \
          --generate-notes
