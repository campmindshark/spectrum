name: Build

on:
  push:
    branches: [ "master" ]
    tags:
      - v*
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        architecture: x64

    - name: Install uv
      run: python -m pip install uv==0.11.26

    - name: Build and test
      shell: pwsh
      run: .\build.ps1 -PythonPath (Get-Command python).Source -SkipPortable

    - name: Upload Python wheel
      uses: actions/upload-artifact@v4
      with:
        name: madmom-${{ github.sha }}
        path: artifacts/wheels/*.whl
